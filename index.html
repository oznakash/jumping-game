<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Anniversary Run - 14 Years</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
            -webkit-touch-callout: none;
        }
        #ui {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            color: white;
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }
        #ui.show {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .screen { display: none; width: 100%; max-width: 600px; }
        .screen.active { display: block; }
        h1 { font-size: 2.5em; margin: 20px 0; color: #ff1493; }
        h2 { font-size: 2em; margin: 15px 0; }
        p { font-size: 1.1em; margin: 10px 0; line-height: 1.6; }
        button {
            padding: 12px 30px;
            font-size: 1.1em;
            margin: 8px;
            border: none;
            border-radius: 6px;
            background: #ff1493;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        button:active { transform: scale(0.95); }
        input {
            padding: 10px;
            font-size: 1em;
            border: 2px solid #ff69b4;
            border-radius: 6px;
            text-align: center;
            margin: 10px 0;
            width: 100%;
            max-width: 300px;
        }
        .score-display {
            font-size: 1.3em;
            margin: 20px 0;
            background: rgba(255,105,180,0.2);
            padding: 15px;
            border-radius: 6px;
        }
        .leaderboard {
            width: 100%;
            max-width: 500px;
            margin: 20px 0;
        }
        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin: 6px 0;
            background: rgba(255,105,180,0.1);
            border-radius: 4px;
            border-left: 3px solid #ff69b4;
        }
        .leaderboard-entry.latest {
            background: rgba(255,215,0,0.2);
            border-left-color: #ffd700;
        }
        .rank { font-weight: bold; min-width: 35px; }
        .name { flex: 1; margin: 0 10px; text-align: left; }
        .score-value { font-weight: bold; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="startScreen" class="screen active">
            <h1>🎉 Anniversary Run</h1>
            <p style="color: #ffb6c1;">Celebrating 14 Years ❤️ Oz & Caroline</p>
            <p style="margin-top: 30px; margin-bottom: 30px;">Tap left/right to move<br>Jump on platforms to climb higher!</p>
            <button onclick="startGame()">Play</button>
            <button onclick="showLeaderboard()">Scores</button>
        </div>

        <div id="gameOverScreen" class="screen">
            <h2>Game Over</h2>
            <div class="score-display">
                <div>Score: <span id="finalScore">0</span></div>
                <div>Best: <span id="bestScore">0</span></div>
            </div>
            <div id="nameInputContainer" style="display:none;">
                <p>🎉 High Score! 🎉</p>
                <input type="text" id="playerName" placeholder="Your name" maxlength="12">
            </div>
            <button onclick="continueAfterGameOver()">Continue</button>
        </div>

        <div id="leaderboardScreen" class="screen">
            <h2>🏆 High Scores 🏆</h2>
            <div class="leaderboard" id="leaderboardList"></div>
            <button onclick="playAgain()">Play Again</button>
            <button onclick="clearLeaderboard()">Clear</button>
            <button onclick="backToStart()">Back</button>
        </div>
    </div>

    <script>
        // Constants
        const GRAVITY = 0.3;
        const JUMP_POWER = 11;
        const PLAYER_W = 24;
        const PLAYER_H = 32;
        const PLATFORM_W = 50;
        const PLATFORM_H = 10;
        const PLATFORM_GAP_MIN = 50;
        const PLATFORM_GAP_MAX = 80;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let dpr = window.devicePixelRatio || 1;

        function resize() {
            dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
        }
        resize();
        window.addEventListener('resize', resize);

        const W = () => canvas.width / dpr;
        const H = () => canvas.height / dpr;

        let gameState = 'start';
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('bestScore') || 0);
        let lastLeader = null;

        // Game world
        let cameraY = 0;
        let platforms = [];
        let nextPlatformY = 0;
        let maxHeightReached = 0;

        const player = {
            x: 0,
            y: 0,
            vy: 0,
            vx: 0,

            init() {
                this.x = W() / 2 - PLAYER_W / 2;
                this.y = H() - 150;
                this.vy = -JUMP_POWER;
                this.vx = 0;
            },

            update() {
                this.vy += GRAVITY;
                this.y += this.vy;
                this.x += this.vx;

                // Wrap around
                const w = W();
                if (this.x < -PLAYER_W) this.x = w;
                if (this.x > w) this.x = -PLAYER_W;

                // Check collisions
                for (let p of platforms) {
                    const touchTop = this.y + PLAYER_H >= p.y && this.y + PLAYER_H <= p.y + PLATFORM_H + 15;
                    const touchX = this.x + PLAYER_W > p.x && this.x < p.x + PLATFORM_W;

                    if (this.vy > 0 && touchTop && touchX) {
                        this.vy = -JUMP_POWER;
                    }
                }

                // Game over if fallen
                if (this.y > cameraY + H() + 100) {
                    return false;
                }

                return true;
            },

            moveLeft() { this.vx = -5; },
            moveRight() { this.vx = 5; },
            stopMove() { this.vx = 0; },

            draw() {
                const sy = this.y - cameraY;
                ctx.fillStyle = '#ff1493';
                ctx.fillRect(this.x, sy, PLAYER_W, PLAYER_H);

                ctx.fillStyle = '#fff';
                ctx.fillRect(this.x + 6, sy + 6, 4, 4);
                ctx.fillRect(this.x + 14, sy + 6, 4, 4);
                ctx.fillStyle = '#000';
                ctx.fillRect(this.x + 7, sy + 7, 2, 2);
                ctx.fillRect(this.x + 15, sy + 7, 2, 2);
            }
        };

        function spawnPlatforms() {
            const w = W();
            const h = H();

            while (nextPlatformY < cameraY + h + 500) {
                const x = Math.random() * (w - PLATFORM_W);
                const gap = PLATFORM_GAP_MIN + Math.random() * (PLATFORM_GAP_MAX - PLATFORM_GAP_MIN);

                platforms.push({ x, y: nextPlatformY });
                nextPlatformY += gap;
            }

            platforms = platforms.filter(p => p.y < cameraY + h + 500);
        }

        function updateCamera() {
            const targetY = Math.max(0, player.y - H() * 0.3);
            cameraY = targetY;
        }

        function drawGame() {
            const w = W();
            const h = H();

            // Sky
            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, '#1e90ff');
            grad.addColorStop(1, '#87ceeb');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // Platforms
            ctx.fillStyle = '#00bb00';
            for (let p of platforms) {
                const sy = p.y - cameraY;
                if (sy > -50 && sy < h + 50) {
                    ctx.fillRect(p.x, sy, PLATFORM_W, PLATFORM_H);
                    ctx.fillStyle = '#ffdd00';
                    ctx.fillRect(p.x + 2, sy, PLATFORM_W - 4, 3);
                    ctx.fillStyle = '#00bb00';
                }
            }

            // Score
            ctx.fillStyle = '#000';
            ctx.font = 'bold 24px Arial';
            ctx.fillText('Score: ' + score, 15, 40);

            // Player
            player.draw();
        }

        // Leaderboard
        function loadLeaderboard() {
            const data = localStorage.getItem('leaderboard');
            return data ? JSON.parse(data) : [];
        }

        function saveLeaderboard(board) {
            localStorage.setItem('leaderboard', JSON.stringify(board));
        }

        function addScore(name, sc) {
            const board = loadLeaderboard();
            board.push({ name, score: sc });
            board.sort((a, b) => b.score - a.score);
            board.splice(5);
            saveLeaderboard(board);
            lastLeader = { name, score: sc };
        }

        function displayLeaderboard() {
            const board = loadLeaderboard();
            const el = document.getElementById('leaderboardList');
            el.innerHTML = '';

            if (!board.length) {
                el.innerHTML = '<p style="padding:40px;text-align:center;">Play to rank!</p>';
                return;
            }

            board.forEach((e, i) => {
                const div = document.createElement('div');
                div.className = 'leaderboard-entry' + (lastLeader && lastLeader.name === e.name ? ' latest' : '');
                div.innerHTML = `<span class="rank">#${i+1}</span><span class="name">${e.name}</span><span class="score-value">${e.score}</span>`;
                el.appendChild(div);
            });
            lastLeader = null;
        }

        // UI
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startGame() {
            gameState = 'playing';
            score = 0;
            cameraY = 0;
            platforms = [];
            nextPlatformY = 0;
            maxHeightReached = 0;

            player.init();
            spawnPlatforms();

            document.getElementById('ui').classList.remove('show');
        }

        function endGame() {
            gameState = 'gameover';

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('bestScore', bestScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('bestScore').textContent = bestScore;

            const board = loadLeaderboard();
            const qualifies = board.length < 5 || score > board[4].score;

            if (qualifies) {
                document.getElementById('nameInputContainer').style.display = 'block';
                document.getElementById('playerName').value = '';
                setTimeout(() => document.getElementById('playerName').focus(), 100);
            } else {
                document.getElementById('nameInputContainer').style.display = 'none';
            }

            document.getElementById('ui').classList.add('show');
            showScreen('gameOverScreen');
        }

        function continueAfterGameOver() {
            const input = document.getElementById('playerName');
            if (document.getElementById('nameInputContainer').style.display !== 'none') {
                const name = (input.value || 'Player').substring(0, 12);
                addScore(name, score);
            }
            showLeaderboard();
        }

        function showLeaderboard() {
            document.getElementById('ui').classList.add('show');
            displayLeaderboard();
            showScreen('leaderboardScreen');
        }

        function playAgain() {
            startGame();
        }

        function backToStart() {
            document.getElementById('ui').classList.add('show');
            showScreen('startScreen');
        }

        function clearLeaderboard() {
            if (confirm('Clear scores?')) {
                localStorage.removeItem('leaderboard');
                lastLeader = null;
                displayLeaderboard();
            }
        }

        // Input
        let leftPressed = false, rightPressed = false;

        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft') { leftPressed = true; e.preventDefault(); }
            if (e.code === 'ArrowRight') { rightPressed = true; e.preventDefault(); }
            if (e.code === 'Space' && gameState === 'start') { e.preventDefault(); startGame(); }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft') leftPressed = false;
            if (e.code === 'ArrowRight') rightPressed = false;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState === 'start') { startGame(); return; }
            if (gameState === 'playing') {
                const x = e.touches[0].clientX / dpr;
                const w = W();
                if (x < w * 0.4) leftPressed = true;
                else if (x > w * 0.6) rightPressed = true;
            }
        }, false);

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (gameState === 'playing') {
                const x = e.touches[0].clientX / dpr;
                const w = W();
                leftPressed = (x < w * 0.4);
                rightPressed = (x > w * 0.6);
            }
        }, false);

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            leftPressed = false;
            rightPressed = false;
        }, false);

        // Game loop
        function gameLoop() {
            if (gameState === 'playing') {
                if (leftPressed) player.moveLeft();
                else if (rightPressed) player.moveRight();
                else player.stopMove();

                const alive = player.update();
                if (!alive) {
                    endGame();
                } else {
                    updateCamera();
                    spawnPlatforms();
                    maxHeightReached = Math.min(maxHeightReached, player.y);
                    score = Math.max(0, Math.floor((H() - 150 - maxHeightReached) / 20));
                }
            }

            drawGame();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
