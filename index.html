<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anniversary Run - 14 Years</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
            touch-action: none;
            background: linear-gradient(135deg, #1e90ff, #87ceeb);
        }

        #ui {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            color: white;
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        #ui.show {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .screen {
            display: none;
            width: 100%;
            max-width: 600px;
        }

        .screen.active {
            display: block;
        }

        h1 {
            font-size: 3em;
            margin: 20px 0;
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            font-size: 2em;
            margin: 15px 0;
        }

        p, .subtitle {
            font-size: 1.2em;
            margin: 10px 0;
            line-height: 1.6;
        }

        .subtitle {
            color: #ffb6c1;
            font-size: 1.1em;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2em;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            color: white;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        input {
            padding: 12px;
            font-size: 1.1em;
            border: 2px solid #ff69b4;
            border-radius: 8px;
            text-align: center;
            margin: 10px 0;
            width: 100%;
            max-width: 300px;
        }

        .score-display {
            font-size: 1.5em;
            margin: 20px 0;
            background: rgba(255,105,180,0.2);
            padding: 15px;
            border-radius: 8px;
        }

        .leaderboard {
            width: 100%;
            max-width: 500px;
            margin: 20px 0;
        }

        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin: 8px 0;
            background: rgba(255,105,180,0.1);
            border-radius: 6px;
            border-left: 4px solid #ff69b4;
        }

        .leaderboard-entry.latest {
            background: rgba(255,215,0,0.2);
            border-left-color: #ffd700;
        }

        .rank {
            font-weight: bold;
            min-width: 40px;
        }

        .name {
            flex: 1;
            margin: 0 15px;
            text-align: left;
        }

        .score-value {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <!-- Start Screen -->
        <div id="startScreen" class="screen active">
            <h1>Anniversary Run</h1>
            <p class="subtitle">Celebrating 14 Years of Oz ❤️ Caroline</p>
            <p style="margin-top: 40px; font-size: 1.1em;">Tap left/right side or use arrow keys<br>Jump on platforms and reach the top!</p>
            <button onclick="startGame()">Play Game</button>
            <button onclick="showLeaderboard()">Leaderboard</button>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="screen">
            <h2>Game Over</h2>
            <div class="score-display">
                <div>Score: <span id="finalScore">0</span></div>
                <div>Best: <span id="bestScore">0</span></div>
            </div>
            <div id="nameInputContainer" style="display:none;">
                <p>🎉 New High Score! 🎉</p>
                <input type="text" id="playerName" placeholder="Enter your name" maxlength="12">
            </div>
            <button onclick="continueAfterGameOver()">Continue</button>
        </div>

        <!-- Leaderboard Screen -->
        <div id="leaderboardScreen" class="screen">
            <h2>🏆 Top Scores 🏆</h2>
            <div class="leaderboard" id="leaderboardList"></div>
            <button onclick="clearLeaderboard()">Clear Scores</button>
            <button onclick="playAgain()">Play Again</button>
            <button onclick="backToStart()">Back to Start</button>
        </div>
    </div>

    <script>
        // ========== CONSTANTS ==========
        const GRAVITY = 0.4;
        const JUMP_VELOCITY = -14;
        const PLATFORM_SPEED = 3;
        const PLAYER_WIDTH = 30;
        const PLAYER_HEIGHT = 40;
        const PLATFORM_WIDTH = 60;
        const PLATFORM_HEIGHT = 12;
        const MIN_PLATFORM_GAP = 70;
        const MAX_PLATFORM_GAP = 110;

        // ========== CANVAS SETUP ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const getLogicalWidth = () => canvas.width / (window.devicePixelRatio || 1);
        const getLogicalHeight = () => canvas.height / (window.devicePixelRatio || 1);

        // ========== GAME STATE ==========
        let gameState = 'start';
        let score = 0;
        let bestScore = localStorage.getItem('bestScore') ? parseInt(localStorage.getItem('bestScore')) : 0;
        let scrollOffset = 0;
        let lastEnteredLeaderboard = null;

        // ========== PLAYER ==========
        let player = {
            x: 0,
            y: 0,
            width: PLAYER_WIDTH,
            height: PLAYER_HEIGHT,
            velocityY: 0,
            velocityX: 0,
            jumping: false,

            init: function() {
                this.x = getLogicalWidth() / 2 - this.width / 2;
                this.y = getLogicalHeight() * 0.7;
                this.velocityY = 0;
                this.velocityX = 0;
                this.jumping = true;
            },

            update: function() {
                // Apply gravity
                this.velocityY += GRAVITY;
                this.y += this.velocityY;

                // Horizontal movement
                this.x += this.velocityX;

                // Wrap around horizontal edges
                const w = getLogicalWidth();
                if (this.x < -this.width) this.x = w;
                if (this.x > w) this.x = -this.width;

                // Check platform collision
                platforms.forEach(p => {
                    if (this.velocityY > 0 &&
                        this.y + this.height >= p.y &&
                        this.y + this.height <= p.y + PLATFORM_HEIGHT + 8 &&
                        this.x + this.width > p.x &&
                        this.x < p.x + p.width) {
                        this.velocityY = JUMP_VELOCITY;
                    }
                });

                // Game over if fell off bottom
                if (this.y > getLogicalHeight() + 50) {
                    return false;
                }

                return true;
            },

            moveLeft: function() {
                this.velocityX = -5;
            },

            moveRight: function() {
                this.velocityX = 5;
            },

            stopMove: function() {
                this.velocityX = 0;
            },

            draw: function() {
                const w = getLogicalWidth();
                const h = getLogicalHeight();

                // Keep player centered vertically at 70%
                const targetY = h * 0.7;
                const offset = this.y - targetY;

                ctx.fillStyle = '#ff1493';
                ctx.fillRect(this.x, targetY, this.width, this.height);

                // Eyes
                ctx.fillStyle = 'white';
                ctx.fillRect(this.x + 8, targetY + 8, 6, 6);
                ctx.fillRect(this.x + 16, targetY + 8, 6, 6);
                ctx.fillStyle = 'black';
                ctx.fillRect(this.x + 9, targetY + 9, 4, 4);
                ctx.fillRect(this.x + 17, targetY + 9, 4, 4);
            }
        };

        // ========== PLATFORMS ==========
        let platforms = [];
        let nextPlatformY = 0;

        function spawnPlatforms() {
            const h = getLogicalHeight();
            const w = getLogicalWidth();

            while (nextPlatformY < scrollOffset) {
                const x = Math.random() * (w - PLATFORM_WIDTH);
                platforms.push({
                    x: x,
                    y: nextPlatformY
                });

                const gap = MIN_PLATFORM_GAP + Math.random() * (MAX_PLATFORM_GAP - MIN_PLATFORM_GAP);
                nextPlatformY -= gap;
            }
        }

        function updateScroll() {
            const h = getLogicalHeight();
            const targetY = h * 0.7;
            const offset = player.y - targetY;

            if (offset > 0) {
                scrollOffset += offset;
                player.y = targetY;
            }

            // Remove platforms that are off-screen
            platforms = platforms.filter(p => p.y < scrollOffset + h);
        }

        function drawPlatforms() {
            const h = getLogicalHeight();
            const targetY = h * 0.7;
            const offset = player.y - targetY;

            platforms.forEach(p => {
                const screenY = p.y - scrollOffset + offset;
                if (screenY > -20 && screenY < h + 20) {
                    ctx.fillStyle = '#00aa44';
                    ctx.fillRect(p.x, screenY, PLATFORM_WIDTH, PLATFORM_HEIGHT);
                    ctx.fillStyle = '#ffd700';
                    ctx.fillRect(p.x + 3, screenY, PLATFORM_WIDTH - 6, 5);
                }
            });
        }

        function drawScore() {
            ctx.fillStyle = 'black';
            ctx.font = 'bold 24px Arial';
            ctx.fillText(`Score: ${score}`, 20, 40);
        }

        function render() {
            const w = getLogicalWidth();
            const h = getLogicalHeight();

            ctx.clearRect(0, 0, w, h);

            // Background
            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, '#1e90ff');
            grad.addColorStop(1, '#87ceeb');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            drawPlatforms();

            if (gameState === 'playing') {
                drawScore();
            }

            player.draw();
        }

        // ========== LEADERBOARD ==========
        function loadLeaderboard() {
            const data = localStorage.getItem('leaderboard');
            return data ? JSON.parse(data) : [];
        }

        function saveLeaderboard(board) {
            localStorage.setItem('leaderboard', JSON.stringify(board));
        }

        function addScore(name, score) {
            const board = loadLeaderboard();
            board.push({ name, score, timestamp: Date.now() });
            board.sort((a, b) => b.score - a.score);
            if (board.length > 5) {
                board.pop();
            }
            saveLeaderboard(board);
            lastEnteredLeaderboard = { name, score };
        }

        function displayLeaderboard() {
            const board = loadLeaderboard();
            const container = document.getElementById('leaderboardList');
            container.innerHTML = '';

            if (board.length === 0) {
                container.innerHTML = '<p style="text-align: center; padding: 40px;">No scores yet. Play to join!</p>';
                return;
            }

            board.forEach((entry, i) => {
                const isLatest = lastEnteredLeaderboard &&
                    lastEnteredLeaderboard.name === entry.name &&
                    lastEnteredLeaderboard.score === entry.score;

                const div = document.createElement('div');
                div.className = `leaderboard-entry ${isLatest ? 'latest' : ''}`;
                div.innerHTML = `
                    <span class="rank">#${i + 1}</span>
                    <span class="name">${entry.name}</span>
                    <span class="score-value">${entry.score}</span>
                `;
                container.appendChild(div);
            });
            lastEnteredLeaderboard = null;
        }

        // ========== UI SCREENS ==========
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function startGame() {
            gameState = 'playing';
            score = 0;
            scrollOffset = 0;
            platforms = [];
            nextPlatformY = 0;

            player.init();
            spawnPlatforms();

            document.getElementById('ui').classList.remove('show');
        }

        function endGame() {
            gameState = 'gameover';

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('bestScore', bestScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('bestScore').textContent = bestScore;

            const board = loadLeaderboard();
            const qualifies = board.length < 5 || score > board[4].score;

            if (qualifies) {
                document.getElementById('nameInputContainer').style.display = 'block';
                document.getElementById('playerName').value = '';
                setTimeout(() => document.getElementById('playerName').focus(), 100);
            } else {
                document.getElementById('nameInputContainer').style.display = 'none';
            }

            document.getElementById('ui').classList.add('show');
            showScreen('gameOverScreen');
        }

        function continueAfterGameOver() {
            const nameInput = document.getElementById('playerName');
            if (document.getElementById('nameInputContainer').style.display !== 'none') {
                const name = (nameInput.value || 'Player').substring(0, 12);
                addScore(name, score);
            }
            showLeaderboard();
        }

        function showLeaderboard() {
            document.getElementById('ui').classList.add('show');
            displayLeaderboard();
            showScreen('leaderboardScreen');
        }

        function playAgain() {
            startGame();
        }

        function backToStart() {
            document.getElementById('ui').classList.add('show');
            showScreen('startScreen');
        }

        function clearLeaderboard() {
            if (confirm('Clear all scores? This cannot be undone.')) {
                localStorage.removeItem('leaderboard');
                lastEnteredLeaderboard = null;
                displayLeaderboard();
            }
        }

        // ========== INPUT ==========
        let keysPressed = {};

        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft') {
                if (gameState === 'playing') player.moveLeft();
            }
            if (e.code === 'ArrowRight') {
                if (gameState === 'playing') player.moveRight();
            }
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'start') startGame();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
                if (gameState === 'playing') player.stopMove();
            }
        });

        // Touch controls - left/right side of screen
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState === 'start') {
                startGame();
                return;
            }

            if (gameState === 'playing') {
                const touch = e.touches[0];
                const w = getLogicalWidth();
                if (touch.clientX < w / 3) {
                    player.moveLeft();
                } else if (touch.clientX > w * 2 / 3) {
                    player.moveRight();
                }
            }
        });

        canvas.addEventListener('touchend', (e) => {
            if (gameState === 'playing') {
                player.stopMove();
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (gameState === 'playing') {
                const touch = e.touches[0];
                const w = getLogicalWidth();
                if (touch.clientX < w / 3) {
                    player.moveLeft();
                } else if (touch.clientX > w * 2 / 3) {
                    player.moveRight();
                } else {
                    player.stopMove();
                }
            }
        });

        // ========== GAME LOOP ==========
        function gameLoop() {
            if (gameState === 'playing') {
                const alive = player.update();
                if (!alive) {
                    endGame();
                } else {
                    updateScroll();
                    spawnPlatforms();
                    score = Math.floor(Math.max(0, scrollOffset) / 10);
                }
            }

            render();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
