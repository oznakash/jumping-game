<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anniversary Run - 14 Years</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        #ui {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            color: white;
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        #ui.show {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .screen {
            display: none;
            width: 100%;
            max-width: 600px;
        }

        .screen.active {
            display: block;
        }

        h1 {
            font-size: 3em;
            margin: 20px 0;
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            font-size: 2em;
            margin: 15px 0;
        }

        p, .subtitle {
            font-size: 1.2em;
            margin: 10px 0;
            line-height: 1.6;
        }

        .subtitle {
            color: #ffb6c1;
            font-size: 1.1em;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2em;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            color: white;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        input {
            padding: 12px;
            font-size: 1.1em;
            border: 2px solid #ff69b4;
            border-radius: 8px;
            text-align: center;
            margin: 10px 0;
            width: 100%;
            max-width: 300px;
        }

        .score-display {
            font-size: 1.5em;
            margin: 20px 0;
            background: rgba(255,105,180,0.2);
            padding: 15px;
            border-radius: 8px;
        }

        .leaderboard {
            width: 100%;
            max-width: 500px;
            margin: 20px 0;
        }

        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin: 8px 0;
            background: rgba(255,105,180,0.1);
            border-radius: 6px;
            border-left: 4px solid #ff69b4;
        }

        .leaderboard-entry.latest {
            background: rgba(255,215,0,0.2);
            border-left-color: #ffd700;
        }

        .rank {
            font-weight: bold;
            min-width: 40px;
        }

        .name {
            flex: 1;
            margin: 0 15px;
            text-align: left;
        }

        .score-value {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <!-- Start Screen -->
        <div id="startScreen" class="screen active">
            <h1>Anniversary Run</h1>
            <p class="subtitle">Celebrating 14 Years of Oz ❤️ Caroline</p>
            <p style="margin-top: 40px; font-size: 1.1em;">Tap or press SPACE to jump<br>Climb the platforms and reach the top!</p>
            <button onclick="startGame()">Play Game</button>
            <button onclick="showLeaderboard()">Leaderboard</button>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="screen">
            <h2>Game Over</h2>
            <div class="score-display">
                <div>Height: <span id="finalScore">0</span></div>
                <div>Best: <span id="bestScore">0</span></div>
            </div>
            <div id="nameInputContainer" style="display:none;">
                <p>🎉 New High Score! 🎉</p>
                <input type="text" id="playerName" placeholder="Enter your name" maxlength="12">
            </div>
            <button onclick="continueAfterGameOver()">Continue</button>
        </div>

        <!-- Leaderboard Screen -->
        <div id="leaderboardScreen" class="screen">
            <h2>🏆 Top Scores 🏆</h2>
            <div class="leaderboard" id="leaderboardList"></div>
            <button onclick="clearLeaderboard()">Clear Scores</button>
            <button onclick="playAgain()">Play Again</button>
            <button onclick="backToStart()">Back to Start</button>
        </div>
    </div>

    <script>
        // ========== CONSTANTS ==========
        const GRAVITY = 0.5;
        const JUMP_VELOCITY = -16;
        const PLATFORM_SPEED = 3;
        const PLAYER_WIDTH = 30;
        const PLAYER_HEIGHT = 40;
        const PLATFORM_WIDTH = 60;
        const PLATFORM_HEIGHT = 15;
        const MIN_PLATFORM_GAP = 60;
        const MAX_PLATFORM_GAP = 100;
        const OBSTACLE_WIDTH = 50;
        const OBSTACLE_HEIGHT = 20;

        // ========== THEME ==========
        const THEME = {
            skyTop: '#1e90ff',
            skyBottom: '#87ceeb',
            player: '#ff1493',
            platform: '#00aa44',
            obstacle: '#ff6b6b',
            accent: '#ffd700',
        };

        // ========== CANVAS SETUP ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const getLogicalWidth = () => canvas.width / (window.devicePixelRatio || 1);
        const getLogicalHeight = () => canvas.height / (window.devicePixelRatio || 1);

        // ========== GAME STATE ==========
        let gameState = 'start';
        let score = 0;
        let bestScore = localStorage.getItem('bestScore') ? parseInt(localStorage.getItem('bestScore')) : 0;
        let cameraY = 0;
        let lastPlatformY = 0;
        let lastEnteredLeaderboard = null;

        // ========== PLAYER ==========
        let player = {
            x: 0,
            y: 0,
            width: PLAYER_WIDTH,
            height: PLAYER_HEIGHT,
            velocityY: 0,
            velocityX: 0,
            jumping: false,
            onPlatform: true,

            update: function() {
                this.velocityY += GRAVITY;
                this.y += this.velocityY;
                this.x += this.velocityX;

                const w = getLogicalWidth();
                // Wrap around horizontally
                if (this.x < -this.width) this.x = w;
                if (this.x > w) this.x = -this.width;

                // Check if player fell off bottom
                if (this.y > cameraY + getLogicalHeight() + 100) {
                    return false; // Game over
                }

                this.jumping = true;
                this.onPlatform = false;

                // Check platform collision
                platforms.forEach(p => {
                    if (this.velocityY >= 0 &&
                        this.y + this.height >= p.y &&
                        this.y + this.height <= p.y + p.height + 5 &&
                        this.x + this.width > p.x &&
                        this.x < p.x + p.width) {
                        this.velocityY = 0;
                        this.y = p.y - this.height;
                        this.jumping = false;
                        this.onPlatform = true;
                    }
                });

                // Check obstacle collision
                obstacles.forEach(o => {
                    if (this.x < o.x + o.width &&
                        this.x + this.width > o.x &&
                        this.y < o.y + o.height &&
                        this.y + this.height > o.y) {
                        return false; // Game over
                    }
                });

                return true;
            },

            jump: function() {
                if (!this.jumping) {
                    this.velocityY = JUMP_VELOCITY;
                    this.jumping = true;
                }
            },

            moveLeft: function() {
                this.velocityX = -5;
            },

            moveRight: function() {
                this.velocityX = 5;
            },

            stopMove: function() {
                this.velocityX = 0;
            },

            draw: function() {
                ctx.fillStyle = THEME.player;
                ctx.fillRect(this.x - cameraX, this.y - cameraY, this.width, this.height);

                // Eyes
                ctx.fillStyle = 'white';
                ctx.fillRect(this.x + 8 - cameraX, this.y + 8 - cameraY, 6, 6);
                ctx.fillRect(this.x + 16 - cameraX, this.y + 8 - cameraY, 6, 6);
                ctx.fillStyle = 'black';
                ctx.fillRect(this.x + 9 - cameraX, this.y + 9 - cameraY, 4, 4);
                ctx.fillRect(this.x + 17 - cameraX, this.y + 9 - cameraY, 4, 4);
            }
        };

        let cameraX = getLogicalWidth() / 2;

        // ========== PLATFORMS ==========
        let platforms = [];
        let obstacles = [];

        function spawnPlatforms() {
            while (lastPlatformY > cameraY - 100) {
                const gap = MIN_PLATFORM_GAP + Math.random() * (MAX_PLATFORM_GAP - MIN_PLATFORM_GAP);
                lastPlatformY -= gap;

                const x = Math.random() * (getLogicalWidth() - PLATFORM_WIDTH);
                const isObstacle = Math.random() < 0.15;

                if (isObstacle) {
                    obstacles.push({
                        x: x,
                        y: lastPlatformY,
                        width: OBSTACLE_WIDTH,
                        height: OBSTACLE_HEIGHT,
                    });
                } else {
                    platforms.push({
                        x: x,
                        y: lastPlatformY,
                        width: PLATFORM_WIDTH,
                        height: PLATFORM_HEIGHT,
                    });
                }
            }
        }

        function updateCamera() {
            cameraY = Math.max(0, player.y - getLogicalHeight() / 3);
            cameraX = getLogicalWidth() / 2;
        }

        function drawBackground() {
            const w = getLogicalWidth();
            const h = getLogicalHeight();

            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, THEME.skyTop);
            grad.addColorStop(1, THEME.skyBottom);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // Parallax clouds
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            const offset = (cameraY * 0.1) % w;
            ctx.beginPath();
            ctx.ellipse(offset - 200, 50, 75, 20, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(offset - 200 + 300, 100, 60, 15, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(offset - 200 + 600, 70, 70, 18, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawPlatforms() {
            platforms.forEach(p => {
                ctx.fillStyle = THEME.platform;
                ctx.fillRect(p.x - cameraX + getLogicalWidth() / 2, p.y - cameraY, p.width, p.height);
                ctx.fillStyle = THEME.accent;
                ctx.fillRect(p.x + 3 - cameraX + getLogicalWidth() / 2, p.y - cameraY, p.width - 6, 5);
            });
        }

        function drawObstacles() {
            obstacles.forEach(o => {
                ctx.fillStyle = THEME.obstacle;
                ctx.fillRect(o.x - cameraX + getLogicalWidth() / 2, o.y - cameraY, o.width, o.height);
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(o.x + 3 - cameraX + getLogicalWidth() / 2, o.y + 2 - cameraY, o.width - 6, 6);
            });
        }

        function drawScore() {
            ctx.fillStyle = 'black';
            ctx.font = 'bold 24px Arial';
            ctx.fillText(`Score: ${score}`, 20, 40);
        }

        function render() {
            const w = getLogicalWidth();
            const h = getLogicalHeight();

            ctx.clearRect(0, 0, w, h);
            drawBackground();
            drawPlatforms();
            drawObstacles();

            if (gameState === 'playing') {
                drawScore();
            }

            player.draw();
        }

        // ========== LEADERBOARD ==========
        function loadLeaderboard() {
            const data = localStorage.getItem('leaderboard');
            return data ? JSON.parse(data) : [];
        }

        function saveLeaderboard(board) {
            localStorage.setItem('leaderboard', JSON.stringify(board));
        }

        function addScore(name, score) {
            const board = loadLeaderboard();
            board.push({ name, score, timestamp: Date.now() });
            board.sort((a, b) => b.score - a.score);
            if (board.length > 5) {
                board.pop();
            }
            saveLeaderboard(board);
            lastEnteredLeaderboard = { name, score };
        }

        function displayLeaderboard() {
            const board = loadLeaderboard();
            const container = document.getElementById('leaderboardList');
            container.innerHTML = '';

            if (board.length === 0) {
                container.innerHTML = '<p style="text-align: center; padding: 40px;">No scores yet. Play to join!</p>';
                return;
            }

            board.forEach((entry, i) => {
                const isLatest = lastEnteredLeaderboard &&
                    lastEnteredLeaderboard.name === entry.name &&
                    lastEnteredLeaderboard.score === entry.score;

                const div = document.createElement('div');
                div.className = `leaderboard-entry ${isLatest ? 'latest' : ''}`;
                div.innerHTML = `
                    <span class="rank">#${i + 1}</span>
                    <span class="name">${entry.name}</span>
                    <span class="score-value">${entry.score}</span>
                `;
                container.appendChild(div);
            });
            lastEnteredLeaderboard = null;
        }

        // ========== UI SCREENS ==========
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function startGame() {
            gameState = 'playing';
            score = 0;
            platforms = [];
            obstacles = [];
            lastPlatformY = 0;
            cameraY = 0;

            player.x = getLogicalWidth() / 2 - PLAYER_WIDTH / 2;
            player.y = getLogicalHeight() - 100;
            player.velocityY = 0;
            player.velocityX = 0;
            player.jumping = false;
            player.onPlatform = true;

            spawnPlatforms();
            document.getElementById('ui').classList.remove('show');
        }

        function endGame() {
            gameState = 'gameover';

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('bestScore', bestScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('bestScore').textContent = bestScore;

            const board = loadLeaderboard();
            const qualifies = board.length < 5 || score > board[4].score;

            if (qualifies) {
                document.getElementById('nameInputContainer').style.display = 'block';
                document.getElementById('playerName').value = '';
                setTimeout(() => document.getElementById('playerName').focus(), 100);
            } else {
                document.getElementById('nameInputContainer').style.display = 'none';
            }

            document.getElementById('ui').classList.add('show');
            showScreen('gameOverScreen');
        }

        function continueAfterGameOver() {
            const nameInput = document.getElementById('playerName');
            if (document.getElementById('nameInputContainer').style.display !== 'none') {
                const name = (nameInput.value || 'Player').substring(0, 12);
                addScore(name, score);
            }
            showLeaderboard();
        }

        function showLeaderboard() {
            document.getElementById('ui').classList.add('show');
            displayLeaderboard();
            showScreen('leaderboardScreen');
        }

        function playAgain() {
            startGame();
        }

        function backToStart() {
            document.getElementById('ui').classList.add('show');
            showScreen('startScreen');
        }

        function clearLeaderboard() {
            if (confirm('Clear all scores? This cannot be undone.')) {
                localStorage.removeItem('leaderboard');
                lastEnteredLeaderboard = null;
                displayLeaderboard();
            }
        }

        // ========== INPUT ==========
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'playing') {
                    player.jump();
                } else if (gameState === 'start') {
                    startGame();
                }
            }
            if (e.code === 'ArrowLeft') {
                if (gameState === 'playing') player.moveLeft();
            }
            if (e.code === 'ArrowRight') {
                if (gameState === 'playing') player.moveRight();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
                if (gameState === 'playing') player.stopMove();
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState === 'playing') {
                player.jump();
            } else if (gameState === 'start') {
                startGame();
            }
        });

        // ========== GAME LOOP ==========
        function gameLoop() {
            if (gameState === 'playing') {
                const alive = player.update();
                if (!alive) {
                    endGame();
                } else {
                    updateCamera();
                    spawnPlatforms();
                    score = Math.max(score, Math.floor(Math.max(0, -lastPlatformY) / 10));

                    // Clean up old platforms and obstacles
                    platforms = platforms.filter(p => p.y > cameraY - 200);
                    obstacles = obstacles.filter(o => o.y > cameraY - 200);
                }
            }

            render();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
