<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anniversary Run - 14 Years</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        canvas {
            display: block;
            touch-action: none;
        }
        #ui {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            color: white;
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }
        #ui.show {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .screen {
            display: none;
            width: 100%;
            max-width: 600px;
        }
        .screen.active {
            display: block;
        }
        h1 {
            font-size: 3em;
            margin: 20px 0;
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        h2 {
            font-size: 2em;
            margin: 15px 0;
        }
        p, .subtitle {
            font-size: 1.2em;
            margin: 10px 0;
            line-height: 1.6;
        }
        .subtitle {
            color: #ffb6c1;
            font-size: 1.1em;
        }
        button {
            padding: 15px 40px;
            font-size: 1.2em;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            color: white;
            font-weight: bold;
            transition: transform 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
        input {
            padding: 12px;
            font-size: 1.1em;
            border: 2px solid #ff69b4;
            border-radius: 8px;
            text-align: center;
            margin: 10px 0;
            width: 100%;
            max-width: 300px;
        }
        .score-display {
            font-size: 1.5em;
            margin: 20px 0;
            background: rgba(255,105,180,0.2);
            padding: 15px;
            border-radius: 8px;
        }
        .leaderboard {
            width: 100%;
            max-width: 500px;
            margin: 20px 0;
        }
        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin: 8px 0;
            background: rgba(255,105,180,0.1);
            border-radius: 6px;
            border-left: 4px solid #ff69b4;
        }
        .leaderboard-entry.latest {
            background: rgba(255,215,0,0.2);
            border-left-color: #ffd700;
        }
        .rank {
            font-weight: bold;
            min-width: 40px;
        }
        .name {
            flex: 1;
            margin: 0 15px;
            text-align: left;
        }
        .score-value {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="startScreen" class="screen active">
            <h1>Anniversary Run</h1>
            <p class="subtitle">Celebrating 14 Years of Oz ❤️ Caroline</p>
            <p style="margin-top: 40px; font-size: 1.1em;">Tap left/right side or use arrow keys<br>Jump on platforms and reach the top!</p>
            <button onclick="startGame()">Play Game</button>
            <button onclick="showLeaderboard()">Leaderboard</button>
        </div>

        <div id="gameOverScreen" class="screen">
            <h2>Game Over</h2>
            <div class="score-display">
                <div>Score: <span id="finalScore">0</span></div>
                <div>Best: <span id="bestScore">0</span></div>
            </div>
            <div id="nameInputContainer" style="display:none;">
                <p>🎉 New High Score! 🎉</p>
                <input type="text" id="playerName" placeholder="Enter your name" maxlength="12">
            </div>
            <button onclick="continueAfterGameOver()">Continue</button>
        </div>

        <div id="leaderboardScreen" class="screen">
            <h2>🏆 Top Scores 🏆</h2>
            <div class="leaderboard" id="leaderboardList"></div>
            <button onclick="clearLeaderboard()">Clear Scores</button>
            <button onclick="playAgain()">Play Again</button>
            <button onclick="backToStart()">Back to Start</button>
        </div>
    </div>

    <script>
        const GRAVITY = 0.4;
        const JUMP_VELOCITY = -14;
        const PLAYER_WIDTH = 30;
        const PLAYER_HEIGHT = 40;
        const PLATFORM_WIDTH = 60;
        const PLATFORM_HEIGHT = 12;
        const MIN_PLATFORM_GAP = 70;
        const MAX_PLATFORM_GAP = 110;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const WIDTH = () => canvas.width / (window.devicePixelRatio || 1);
        const HEIGHT = () => canvas.height / (window.devicePixelRatio || 1);

        let gameState = 'start';
        let score = 0;
        let bestScore = localStorage.getItem('bestScore') ? parseInt(localStorage.getItem('bestScore')) : 0;
        let scrollY = 0;
        let lastEnteredLeaderboard = null;

        const player = {
            x: 0,
            worldY: 0,
            velocityY: 0,
            velocityX: 0,
            canJump: false,

            init() {
                this.x = WIDTH() / 2 - PLAYER_WIDTH / 2;
                this.worldY = HEIGHT() * 0.7;
                this.velocityY = 0;
                this.velocityX = 0;
                this.canJump = true;
            },

            update() {
                this.velocityY += GRAVITY;
                this.worldY += this.velocityY;
                this.x += this.velocityX;

                const w = WIDTH();
                if (this.x < 0) this.x = w;
                if (this.x > w) this.x = 0;

                this.canJump = false;

                for (let p of platforms) {
                    if (this.velocityY >= 0 &&
                        this.worldY + PLAYER_HEIGHT >= p.y &&
                        this.worldY + PLAYER_HEIGHT <= p.y + PLATFORM_HEIGHT + 10 &&
                        this.x + PLAYER_WIDTH > p.x &&
                        this.x < p.x + PLATFORM_WIDTH) {
                        this.velocityY = JUMP_VELOCITY;
                        this.canJump = true;
                    }
                }

                if (this.worldY > scrollY + HEIGHT() + 100) {
                    return false;
                }

                if (this.worldY < scrollY - 100) {
                    return false;
                }

                return true;
            },

            moveLeft() {
                this.velocityX = -5;
            },

            moveRight() {
                this.velocityX = 5;
            },

            stopMove() {
                this.velocityX = 0;
            },

            draw() {
                const screenY = this.worldY - scrollY;
                ctx.fillStyle = '#ff1493';
                ctx.fillRect(this.x, screenY, PLAYER_WIDTH, PLAYER_HEIGHT);

                ctx.fillStyle = 'white';
                ctx.fillRect(this.x + 8, screenY + 8, 6, 6);
                ctx.fillRect(this.x + 16, screenY + 8, 6, 6);
                ctx.fillStyle = 'black';
                ctx.fillRect(this.x + 9, screenY + 9, 4, 4);
                ctx.fillRect(this.x + 17, screenY + 9, 4, 4);
            }
        };

        let platforms = [];
        let nextY = 0;

        function spawnPlatforms() {
            const h = HEIGHT();
            const w = WIDTH();

            while (nextY > scrollY - 200) {
                const x = Math.random() * (w - PLATFORM_WIDTH);
                platforms.push({
                    x: x,
                    y: nextY
                });

                const gap = MIN_PLATFORM_GAP + Math.random() * (MAX_PLATFORM_GAP - MIN_PLATFORM_GAP);
                nextY -= gap;
            }

            platforms = platforms.filter(p => p.y < scrollY + h + 200);
        }

        function updateScroll() {
            const targetScreenY = HEIGHT() * 0.7;
            const diff = player.worldY - (scrollY + targetScreenY);

            if (diff > 0) {
                scrollY += diff;
                player.worldY = scrollY + targetScreenY;
            }
        }

        function render() {
            const w = WIDTH();
            const h = HEIGHT();

            ctx.fillStyle = '#1e90ff';
            ctx.fillRect(0, 0, w, h);

            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, '#1e90ff');
            grad.addColorStop(1, '#87ceeb');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            for (let p of platforms) {
                const screenY = p.y - scrollY;
                if (screenY > -30 && screenY < h + 30) {
                    ctx.fillStyle = '#00aa44';
                    ctx.fillRect(p.x, screenY, PLATFORM_WIDTH, PLATFORM_HEIGHT);
                    ctx.fillStyle = '#ffd700';
                    ctx.fillRect(p.x + 3, screenY, PLATFORM_WIDTH - 6, 5);
                }
            }

            if (gameState === 'playing') {
                ctx.fillStyle = 'black';
                ctx.font = 'bold 24px Arial';
                ctx.fillText('Score: ' + score, 20, 40);
            }

            player.draw();
        }

        function loadLeaderboard() {
            const data = localStorage.getItem('leaderboard');
            return data ? JSON.parse(data) : [];
        }

        function saveLeaderboard(board) {
            localStorage.setItem('leaderboard', JSON.stringify(board));
        }

        function addScore(name, sc) {
            const board = loadLeaderboard();
            board.push({ name, score: sc, timestamp: Date.now() });
            board.sort((a, b) => b.score - a.score);
            if (board.length > 5) board.pop();
            saveLeaderboard(board);
            lastEnteredLeaderboard = { name, score: sc };
        }

        function displayLeaderboard() {
            const board = loadLeaderboard();
            const container = document.getElementById('leaderboardList');
            container.innerHTML = '';

            if (board.length === 0) {
                container.innerHTML = '<p style="text-align: center; padding: 40px;">No scores yet. Play to join!</p>';
                return;
            }

            board.forEach((entry, i) => {
                const isLatest = lastEnteredLeaderboard &&
                    lastEnteredLeaderboard.name === entry.name &&
                    lastEnteredLeaderboard.score === entry.score;

                const div = document.createElement('div');
                div.className = 'leaderboard-entry' + (isLatest ? ' latest' : '');
                div.innerHTML = '<span class="rank">#' + (i + 1) + '</span><span class="name">' + entry.name + '</span><span class="score-value">' + entry.score + '</span>';
                container.appendChild(div);
            });
            lastEnteredLeaderboard = null;
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function startGame() {
            gameState = 'playing';
            score = 0;
            scrollY = 0;
            platforms = [];
            nextY = 0;

            player.init();
            spawnPlatforms();

            document.getElementById('ui').classList.remove('show');
        }

        function endGame() {
            gameState = 'gameover';

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('bestScore', bestScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('bestScore').textContent = bestScore;

            const board = loadLeaderboard();
            const qualifies = board.length < 5 || score > board[4].score;

            if (qualifies) {
                document.getElementById('nameInputContainer').style.display = 'block';
                document.getElementById('playerName').value = '';
                setTimeout(() => document.getElementById('playerName').focus(), 100);
            } else {
                document.getElementById('nameInputContainer').style.display = 'none';
            }

            document.getElementById('ui').classList.add('show');
            showScreen('gameOverScreen');
        }

        function continueAfterGameOver() {
            const nameInput = document.getElementById('playerName');
            if (document.getElementById('nameInputContainer').style.display !== 'none') {
                const name = (nameInput.value || 'Player').substring(0, 12);
                addScore(name, score);
            }
            showLeaderboard();
        }

        function showLeaderboard() {
            document.getElementById('ui').classList.add('show');
            displayLeaderboard();
            showScreen('leaderboardScreen');
        }

        function playAgain() {
            startGame();
        }

        function backToStart() {
            document.getElementById('ui').classList.add('show');
            showScreen('startScreen');
        }

        function clearLeaderboard() {
            if (confirm('Clear all scores?')) {
                localStorage.removeItem('leaderboard');
                lastEnteredLeaderboard = null;
                displayLeaderboard();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' && gameState === 'playing') player.moveLeft();
            if (e.code === 'ArrowRight' && gameState === 'playing') player.moveRight();
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'start') startGame();
            }
        });

        document.addEventListener('keyup', (e) => {
            if ((e.code === 'ArrowLeft' || e.code === 'ArrowRight') && gameState === 'playing') player.stopMove();
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState === 'start') startGame();
            if (gameState === 'playing') {
                const w = WIDTH();
                const x = e.touches[0].clientX;
                if (x < w / 3) player.moveLeft();
                else if (x > w * 2 / 3) player.moveRight();
            }
        });

        canvas.addEventListener('touchend', (e) => {
            if (gameState === 'playing') player.stopMove();
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (gameState === 'playing') {
                const w = WIDTH();
                const x = e.touches[0].clientX;
                if (x < w / 3) player.moveLeft();
                else if (x > w * 2 / 3) player.moveRight();
                else player.stopMove();
            }
        });

        function gameLoop() {
            if (gameState === 'playing') {
                const alive = player.update();
                if (!alive) {
                    endGame();
                } else {
                    updateScroll();
                    spawnPlatforms();
                    score = Math.max(0, Math.floor(Math.max(0, -nextY + HEIGHT() * 0.7) / 10));
                }
            }

            render();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
